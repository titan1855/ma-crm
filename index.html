<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MA 名單管理</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B5E3B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MA 名單管理">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
</head>
<body>

  <!-- ============================================================
       載入中畫面（頁面初始顯示，auth 狀態確認後隱藏）
       ============================================================ -->
  <div id="loading-screen">
    <div class="loading-logo">MA ENGINE</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- ============================================================
       登入畫面
       ============================================================ -->
  <div id="login-screen" style="display:none">
    <div class="login-inner">
      <div class="login-logo-area">
        <div class="login-app-icon">🌿</div>
        <h1 class="login-title">MA 跟進引擎</h1>
        <p class="login-subtitle">你的事業夥伴管理系統</p>
      </div>

      <div class="login-card">
        <button id="btn-google-login" class="btn-google">
          <!-- Google 官方 SVG Logo -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          使用 Google 帳號登入
        </button>
        <p class="login-hint">僅限受邀的夥伴使用</p>
      </div>
    </div>
  </div>

  <!-- ============================================================
       未授權畫面
       ============================================================ -->
  <div id="rejected-screen" style="display:none">
    <div class="login-inner">
      <div class="rejected-card">
        <div class="rejected-icon">🔒</div>
        <h2 class="rejected-title">尚未獲得使用權限</h2>
        <p class="rejected-msg">你的帳號目前不在白名單中，<br>請聯繫邀請你的人取得授權。</p>
        <p class="rejected-email" id="rejected-email"></p>
        <button id="btn-logout-rejected" class="btn-outline-white">登出並切換帳號</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       初次設定畫面（輸入姓名）
       ============================================================ -->
  <div id="setup-screen" style="display:none">
    <div class="setup-inner">
      <div class="setup-welcome">
        <div class="setup-emoji">👋</div>
        <h1 class="setup-title">歡迎加入！</h1>
        <p class="setup-sub">請輸入你的姓名，開始使用 MA 名單管理</p>
      </div>

      <div class="setup-card">
        <label class="setup-label" for="setup-name">你的姓名</label>
        <input
          id="setup-name"
          class="setup-input"
          type="text"
          placeholder="例如：陳小明"
          maxlength="20"
          autocomplete="name"
        >
        <button id="btn-setup-submit" class="btn-submit-green">開始使用 →</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       主應用程式（登入且有 profile 後顯示）
       ============================================================ -->
  <div id="app" style="display:none">

    <!-- Header -->
    <header id="app-header">
      <div class="header-top">
        <div class="header-title-area">
          <span class="header-greeting" id="header-greeting">早安</span>
          <h1 class="header-user-name" id="header-user-name">載入中…</h1>
        </div>
        <div class="header-actions">
          <div class="streak-badge" title="連續達標天數">
            <span class="streak-fire">🔥</span>
            <span id="streak-count">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- 主內容（各模組動態渲染到這裡） -->
    <main id="app-content" role="main">
    </main>

    <!-- 底部 Tab Bar -->
    <nav id="tab-bar" role="navigation" aria-label="主要導覽">
      <button class="tab-item active" data-tab="312" aria-label="每日312">
        <span class="tab-icon">✅</span>
        <span class="tab-label">每日312</span>
      </button>
      <button class="tab-item" data-tab="prospects" aria-label="首選名單">
        <span class="tab-icon">⭐</span>
        <span class="tab-label">首選名單</span>
      </button>
      <button class="tab-item" data-tab="pool" aria-label="名單池">
        <span class="tab-icon">📋</span>
        <span class="tab-label">名單池</span>
      </button>
      <button class="tab-item" data-tab="more" aria-label="更多">
        <span class="tab-icon">☰</span>
        <span class="tab-label">更多</span>
      </button>
    </nav>

  </div><!-- /#app -->

  <!-- ============================================================
       全域 Modal 容器（所有模組共用）
       ============================================================ -->
  <div id="modal-container" aria-live="polite"></div>

  <!-- 詳情面板（滑入式） -->
  <div id="detail-panel" role="dialog" aria-modal="true"></div>

  <!-- Toast 通知 -->
  <div id="toast-container" aria-live="assertive" aria-atomic="true"></div>

  <!-- 應用程式進入點 -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
